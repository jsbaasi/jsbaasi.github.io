<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jsbaasi.github.io</title>
  <link rel="stylesheet" href="/style.css">
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['\\[', '\\]']]
      },
      startup: {
        ready() {
          document.querySelectorAll('span.kdmath').forEach(function(el) {
            const latex = el.textContent.slice(1, -1);
            const node = document.createTextNode('\\[' + latex + '\\]');
            el.parentNode.replaceChild(node, el);
          });
          MathJax.startup.defaultReady();
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <header>
    <nav>
      <a href="/">Home</a>
      <a href="/books">Books</a>
      <a href="/blog">Blog</a>
      <a href="/games">Games</a>
    </nav>
    <h1>jsbaasi</h1>
  </header>
  <main>
    {{ content }}
  </main>
</body>
</html>
